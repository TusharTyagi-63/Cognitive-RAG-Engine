# =============================================================================
# Alembic Configuration — Cognitive RAG Engine
# =============================================================================
# This file controls Alembic's migration tooling. The `sqlalchemy.url` value
# below is a **placeholder** — it is overridden at runtime by `alembic/env.py`,
# which reads the real connection string from `backend.app.core.config.settings`.
#
# Usage:
#   alembic revision --autogenerate -m "describe the change"
#   alembic upgrade head
#   alembic downgrade -1
# =============================================================================

[alembic]
# Path to the Alembic scripts directory (relative to this file).
script_location = alembic

# Template used when generating new revision files.
# file_template = %%(rev)s_%%(slug)s

# Placeholder — overridden programmatically in env.py from app settings.
# Never put real credentials here; they belong in .env / environment variables.
sqlalchemy.url = postgresql+psycopg2://user:password@localhost:5432/dbname

# sys.path prepend — ensures `backend.app` is importable from the project root.
prepend_sys_path = .

# Timezone for revision file date stamps (UTC recommended).
# timezone =

# Maximum length of the "slug" portion of auto-generated revision filenames.
# truncate_slug_length = 40

# Set to 'true' to run the environment during `alembic revision --autogenerate`
# to detect the current schema state (default behaviour).
# revision_environment = false

# Set to 'true' so that env.py is run even when only generating SQL scripts
# (offline mode) — needed because we override the URL in env.py.
# sourceless = false

# Version location — default is %(here)s/alembic/versions
# version_locations = %(here)s/bar:%(here)s/bat:%(here)s/alembic/versions

# Version-path separator — use "os" to auto-detect based on OS.
# version_path_separator = os  # default: use os.pathsep

# Output encoding for generated revision files.
output_encoding = utf-8


# ---------------------------------------------------------------------------
# Logging — follows Python's `logging.config.fileConfig()` format.
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
