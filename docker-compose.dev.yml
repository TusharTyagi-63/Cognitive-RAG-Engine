# ==============================================================================
# Docker Compose — Development Environment (PostgreSQL only)
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d       # Start
#   docker compose -f docker-compose.dev.yml down         # Stop
#   docker compose -f docker-compose.dev.yml down -v      # Stop + delete data
#
# Credentials are read from .env automatically.
# ==============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_platform}
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag_user} -d ${POSTGRES_DB:-rag_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
